{% extends "base.html" %}
{% block title %}报告段落{% endblock %}
{% block content %}
<h2>{{ project.name }} - 审计报告问题段落</h2>
<div class="actions">
  <a class="btn light" href="{{ url_for('project_detail', project_id=project.id) }}">返回项目</a>
  <a class="btn light" href="{{ url_for('risk_list', project_id=project.id) }}">风险清单</a>
  <a class="btn light" href="{{ url_for('working_papers', project_id=project.id) }}">底稿草稿</a>
</div>
{% for r in risks %}
<div class="panel">
  <h3>规则 {{ r.rule_code }} <span class="badge">{{ r.risk_level }} / {{ r.score }}</span></h3>
  <div class="pre">{{ r.report_paragraph }}</div>
</div>
{% endfor %}
{% endblock %}
