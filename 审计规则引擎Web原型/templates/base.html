<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}工程项目招标投标审计规则引擎{% endblock %}</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d8e0ea;
      --brand: #1f4e78;
      --brand-2: #2f7f7b;
      --danger: #b42318;
      --ok: #157347;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
    header { background: var(--brand); color: white; padding: 14px 24px; }
    header h1 { margin: 0; font-size: 20px; }
    nav { display: flex; gap: 8px; flex-wrap: wrap; background: #eaf0f6; padding: 10px 24px; border-bottom: 1px solid var(--line); }
    nav a { color: var(--brand); text-decoration: none; padding: 7px 10px; border-radius: 4px; font-weight: 600; }
    nav a:hover { background: white; }
    main { padding: 22px 24px 40px; max-width: 1440px; margin: 0 auto; }
    .status { color: #dbeafe; font-size: 13px; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .card, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 16px; }
    .card strong { display: block; font-size: 28px; margin-bottom: 4px; color: var(--brand); }
    h2 { margin: 0 0 14px; font-size: 22px; }
    h3 { margin: 18px 0 10px; font-size: 17px; }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    input[type=text], textarea, input[type=file] { width: 100%; padding: 9px 10px; border: 1px solid var(--line); border-radius: 4px; background: white; }
    textarea { min-height: 86px; resize: vertical; }
    button, .btn { display: inline-block; border: 0; background: var(--brand); color: white; padding: 9px 12px; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: 600; }
    button.secondary, .btn.secondary { background: var(--brand-2); }
    button.light, .btn.light { background: white; color: var(--brand); border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--line); }
    th, td { border: 1px solid var(--line); padding: 8px 9px; text-align: left; vertical-align: top; font-size: 13px; }
    th { background: #eaf0f6; color: #17324d; position: sticky; top: 0; z-index: 1; }
    .table-wrap { overflow: auto; max-height: 68vh; border: 1px solid var(--line); background: white; }
    .flash { padding: 10px 12px; border-radius: 4px; margin: 0 0 12px; border: 1px solid var(--line); background: white; }
    .flash.success { border-color: #9bd1b5; color: var(--ok); }
    .flash.error { border-color: #f0a9a2; color: var(--danger); }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pre { white-space: pre-wrap; background: #f8fafc; border: 1px solid var(--line); padding: 10px; border-radius: 4px; line-height: 1.5; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 99px; background: #eaf0f6; color: var(--brand); font-size: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <h1>工程项目招标投标审计规则引擎系统</h1>
    <div class="status">当前规则库：{{ active_rulebook.name if active_rulebook else '未导入' }}</div>
  </header>
  <nav>
    <a href="{{ url_for('index') }}">首页</a>
    <a href="{{ url_for('import_rules') }}">导入规则库</a>
    <a href="{{ url_for('projects') }}">审计项目</a>
    <a href="{{ url_for('rules_index') }}">规则表查看</a>
  </nav>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
